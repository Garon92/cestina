<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piš a poslouchej – Čeština pro Adámka</title>
  <link rel="stylesheet" href="css/style.css?v=20260414a">
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="btn-back">← Menu</a>
    <span class="page-title">Piš a poslouchej</span>
  </div>

  <div class="main-area">
    <div class="round-info" id="roundInfo">Napiš slovo nebo větu a klikni na reproduktor</div>

    <div class="text-playground card">
      <div class="view-toggle text-case-toggle">
        <button class="btn active" data-case="upper">VELKÁ</button>
        <button class="btn" data-case="lower">malá</button>
      </div>

      <textarea
        id="textInput"
        class="text-input"
        rows="5"
        aria-label="Text k přečtení"
        spellcheck="false"
      ></textarea>

      <div class="text-primary-action">
        <button class="btn btn-primary btn-speaker-sm" id="btnSpeak" type="button" aria-label="Přečíst text">🔊</button>
        <span class="text-action-note">Ctrl+Enter text přečte</span>
      </div>

      <div class="text-clear-row">
        <button class="btn btn-clear" id="btnClear" type="button">Vymazat pole</button>
      </div>

      <div class="text-history" id="textHistoryWrap" hidden>
        <div class="text-history-title">Posledních 5 textů</div>
        <div class="text-history-list" id="textHistory"></div>
        <div class="text-history-actions">
          <button class="btn btn-clear-all" id="btnClearHistory" type="button">Vymazat vše</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/common.js?v=20260414a"></script>
  <script src="js/psani.js?v=20260414a"></script>

</body>
</html>
