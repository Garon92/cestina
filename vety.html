<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Věty – Čeština pro Adámka</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="btn-back">← Menu</a>
    <span class="page-title">Doplň slovo</span>
    <div class="top-bar-controls">
      <button class="btn btn-primary btn-speaker-sm" id="btnSpeak" style="margin:0">🔊</button>
      <div class="view-toggle" style="margin-bottom: 0;">
        <button class="btn active" data-mode="normal" id="toggleNormal">Aa</button>
        <button class="btn" data-mode="upper" id="toggleUpper">AA</button>
      </div>
    </div>
  </div>

  <div class="main-area">
    <div class="round-info" id="roundInfo">Doplň chybějící slovo do věty</div>

    <div class="sentence-display" id="sentenceDisplay"></div>

    <p class="feedback" id="feedback">&nbsp;</p>

    <div class="options-grid options-words" id="options"></div>

    <div class="score-bar">
      <span>Správně: <span class="value" id="scoreCorrect">0</span></span>
      <span>Pokusy: <span class="value" id="scoreTotal">0</span></span>
      <span>Série: <span class="value" id="scoreStreak">0</span></span>
    </div>

    <button class="btn btn-primary" id="btnSkip" style="margin-top: 14px;">Přeskočit (Esc)</button>
  </div>

  <script src="js/common.js"></script>
  <script src="js/vety.js"></script>

</body>
</html>
